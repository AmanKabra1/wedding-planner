version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: wedding_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wedding_planner
      MYSQL_USER: weddinguser
      MYSQL_PASSWORD: weddingpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wedding_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: weddinguser
      DB_PASSWORD: weddingpass
      DB_DATABASE: wedding_planner
      JWT_SECRET: your_super_secret_jwt_key_here_32chars
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wedding_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
